<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SELeven-SD</title>
  <meta name="description" content="SELeven-SD 的个人主页（GitHub Pages）。" />
  <style>
    body { margin:0; padding:40px; background:#0b1220; color:#e6edf3;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; }
    .wrap { max-width: 920px; margin: 0 auto; }
    .card { background:#111a2e; border:1px solid #22304d; border-radius:16px; padding:28px; }
    h1 { margin:0 0 8px; font-size:28px; }
    h2 { margin: 18px 0 8px; font-size: 18px; }
    p, li { line-height: 1.7; }
    a { color:#7cc4ff; text-decoration:none; }
    a:hover { text-decoration: underline; }
    .muted { color:#9fb0c0; }
    .tag { display:inline-block; padding:4px 10px; border-radius:999px;
      border:1px solid #2a3b5f; background:#0e1730; margin:6px 8px 0 0; font-size:12px; color:#b9c7d6; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-top:16px; }
    @media (max-width: 720px){ .grid{ grid-template-columns: 1fr; } }
    .footer { margin-top: 14px; font-size: 12px; }
    .btn { display:inline-block; padding:10px 14px; border-radius:12px;
      border:1px solid #2a3b5f; background:#0e1730; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <p class="muted">GitHub Pages · <a href="https://SELeven-SD.github.io/">https://SELeven-SD.github.io/</a></p>

      <h1>SELeven-SD</h1>
      <p class="muted">欢迎来到我的个人主页。</p>

      <h2>快速链接</h2>
      <p>
        <a class="btn" href="https://github.com/SELeven-SD" target="_blank" rel="noreferrer">GitHub 主页</a>
      </p>

      <div class="grid">
        <div>
          <h2>项目</h2>
          <ul>
            <li>（你可以把想展示的仓库链接放这里）</li>
            <li>例如：<a href="https://github.com/SELeven-SD" target="_blank" rel="noreferrer">https://github.com/SELeven-SD</a></li>
          </ul>
        </div>
        <div>
          <h2>技能（可选）</h2>
          <div>
            <span class="tag">Python</span>
            <span class="tag">JavaScript</span>
            <span class="tag">Linux</span>
          </div>
          <p class="muted">（不想写方向的话，这一块也可以删掉。）</p>
        </div>
      </div>

      <p class="footer muted">最后更新：<span id="t"></span></p>
    </div>
  </div>

  <script>
    document.getElementById('t').textContent = new Date().toISOString().slice(0, 10);
  </script>
</body>
</html>
